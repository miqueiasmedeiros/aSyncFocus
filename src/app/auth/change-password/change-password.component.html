<div class="change-pw-page">
  <mat-card class="change-pw-card">
    <div class="card-icon">
      <mat-icon>lock_reset</mat-icon>
    </div>

    <h2>Defina sua nova senha</h2>
    <p class="subtitle">
      Sua conta foi criada por um administrador. Por segurança, você precisa criar uma nova senha antes de continuar.
    </p>

    <form [formGroup]="form" (ngSubmit)="submit()" class="form">
      <mat-form-field appearance="outline">
        <mat-label>Nova senha</mat-label>
        <input matInput type="password" formControlName="password" />
        <mat-error *ngIf="form.get('password')?.hasError('minlength')">Mínimo 6 caracteres</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Confirmar senha</mat-label>
        <input matInput type="password" formControlName="confirm" />
        <mat-error *ngIf="form.hasError('mismatch')">As senhas não coincidem</mat-error>
      </mat-form-field>

      <button
        mat-raised-button
        color="primary"
        type="submit"
        [disabled]="form.invalid || loading"
        class="submit-btn"
      >
        <mat-spinner *ngIf="loading" diameter="20"></mat-spinner>
        <span *ngIf="!loading">Salvar nova senha</span>
      </button>
    </form>
  </mat-card>
</div>
