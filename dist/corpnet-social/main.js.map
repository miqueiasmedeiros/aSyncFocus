<div class="auth-container">
  <mat-card class="auth-card card-elevated">
    <h2 class="section-title">Verify your email</h2>
    <p class="text-muted">Paste the token that was sent to you.</p>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Verification token</mat-label>
        <input matInput type="text" formControlName="token" />
      </mat-form-field>

      <button mat-flat-button color="primary" class="full-width" [disabled]="loading">
        {{ loading ? 'Verifying...' : 'Verify email' }}
      </button>
    </form>

    <div class="auth-links">
      <a routerLink="/login">Back to login</a>
      <a routerLink="/register">Create account</a>
    </div>
  </mat-card>
</div>
