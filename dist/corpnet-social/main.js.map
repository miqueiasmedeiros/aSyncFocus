<div class="home-layout">
  <section class="feed">
    <div class="feed-header">
      <h2 class="section-title">Posts</h2>
      <button mat-stroked-button color="primary" (click)="loadFeed()">Atualizar</button>
    </div>

    <div *ngIf="loading" class="text-muted">Carregando posts...</div>

    <div *ngFor="let post of posts" class="feed-item">
      <app-post-card
        [post]="post"
        [currentUserId]="currentUser?.id || ''"
        [currentUserName]="currentUser?.name || ''"
        (postUpdated)="handlePostUpdated($event)"
        (postDeleted)="handlePostDeleted($event)"
      ></app-post-card>
    </div>
  </section>
</div>
