<div class="auth-container">
  <mat-card class="auth-card card-elevated">
    <h2 class="section-title">Join CorpNet</h2>
    <p class="text-muted">Create your internal network profile.</p>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Name</mat-label>
        <input matInput type="text" formControlName="name" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>
        <input matInput type="email" formControlName="email" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Password</mat-label>
        <input matInput type="password" formControlName="password" />
      </mat-form-field>

      <button mat-flat-button color="primary" class="full-width" [disabled]="loading">
        {{ loading ? 'Creating account...' : 'Register' }}
      </button>
    </form>

    <div class="auth-links">
      <a routerLink="/login">Already have an account?</a>
      <a routerLink="/verify-email">Verify email</a>
    </div>
  </mat-card>
</div>
