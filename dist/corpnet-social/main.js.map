<div class="auth-container">
  <mat-card class="auth-card card-elevated">
    <h2 class="section-title">Welcome back</h2>
    <p class="text-muted">Sign in to your corporate network.</p>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>
        <input matInput type="email" formControlName="email" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Password</mat-label>
        <input matInput type="password" formControlName="password" />
      </mat-form-field>

      <button mat-flat-button color="primary" class="full-width" [disabled]="loading">
        {{ loading ? 'Signing in...' : 'Login' }}
      </button>
    </form>

    <div class="auth-links">
      <a routerLink="/register">Create account</a>
      <a routerLink="/verify-email">Verify email</a>
    </div>
  </mat-card>
</div>
