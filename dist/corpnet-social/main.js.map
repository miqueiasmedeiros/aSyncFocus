<div class="comments">
  <div *ngIf="loading" class="text-muted">Carregando comentarios...</div>

  <mat-list *ngIf="comments.length > 0">
    <mat-list-item *ngFor="let comment of comments">
      <div class="comment-item">
        <strong>{{ comment.author.name }}</strong>
        <span class="text-muted">{{ comment.createdAt | date: 'short' }}</span>
        <p>{{ comment.content }}</p>
      </div>
    </mat-list-item>
  </mat-list>

  <div *ngIf="!loading && comments.length === 0" class="empty-state text-muted">
    Nenhum comentario ainda. Seja o primeiro a comentar!
  </div>

  <app-comment-form
    [postId]="postId"
    (commentAdded)="handleCommentAdded($event)"
  ></app-comment-form>
</div>
