<div class="profile-page">
  <mat-card class="profile-card">
    <div class="profile-header">
      <div class="avatar-wrapper">
        <div class="avatar" *ngIf="!avatarPreview">{{ form.get('name')?.value?.slice(0, 2) || 'U' }}</div>
        <img *ngIf="avatarPreview" [src]="avatarPreview" alt="Foto de perfil" />
      </div>
      <div>
        <h2>Editar perfil</h2>
        <p class="text-muted">Atualize seus dados e foto para o feed interno.</p>
      </div>
    </div>

    <form [formGroup]="form" (ngSubmit)="save()">
      <div class="form-grid">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Nome completo</mat-label>
          <input matInput type="text" formControlName="name" />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" disabled />
        </mat-form-field>
      </div>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>URL da foto de perfil</mat-label>
        <input
          matInput
          type="url"
          formControlName="avatarUrl"
          (input)="onAvatarUrlInput()"
          placeholder="https://cdn.company.local/avatar/usuario.png"
        />
        <mat-hint>Maximo 500 caracteres. O backend nao aceita base64.</mat-hint>
      </mat-form-field>

      <div class="upload-section">
        <label class="upload-label">Preview rapido</label>
        <div class="upload-controls">
          <input type="file" id="avatarUpload" (change)="onFileSelected($event)" hidden />
          <label for="avatarUpload" class="upload-button">Selecionar imagem</label>
          <span class="text-muted">Apenas para previsualizacao local</span>
        </div>
      </div>

      <div class="actions">
        <button mat-flat-button color="primary" [disabled]="loading">
          {{ loading ? 'Salvando...' : 'Salvar alteracoes' }}
        </button>
      </div>
    </form>
  </mat-card>
</div>
