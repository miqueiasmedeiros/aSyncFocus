<mat-toolbar class="app-toolbar">
  <div class="toolbar-left">
    <span class="brand">aSync</span>
    <mat-form-field appearance="outline" class="toolbar-select">
      <mat-select value="all">
        <mat-option value="all">Todos os posts</mat-option>
        <mat-option value="unread">Nao lidos</mat-option>
      </mat-select>
    </mat-form-field>
    <mat-form-field appearance="outline" class="toolbar-search">
      <mat-label>Buscar posts...</mat-label>
      <input matInput type="text" placeholder="Buscar posts..." />
    </mat-form-field>
  </div>

  <span class="spacer"></span>

  <div class="toolbar-right" *ngIf="user$ | async as user; else loggedOut">
    <a class="user-chip" [routerLink]="['/profile']">
      <div class="avatar" *ngIf="!user.avatarUrl">{{ getInitials(user.name) }}</div>
      <img *ngIf="user.avatarUrl" [src]="user.avatarUrl" alt="Avatar" class="avatar-img" />
      <span>{{ user.name }}</span>
    </a>
    <button mat-stroked-button color="primary" routerLink="/posts/new">+Post</button>
    <button mat-stroked-button color="warn" (click)="logout()">Sair</button>
  </div>

  <ng-template #loggedOut>
    <button mat-button routerLink="/login">Login</button>
    <button mat-flat-button color="accent" routerLink="/register">Register</button>
  </ng-template>
</mat-toolbar>

<main class="app-shell">
  <router-outlet></router-outlet>
</main>
