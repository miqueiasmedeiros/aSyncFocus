x-api-environment: &api-environment
  PORT: ${PORT:-8080}
  NODE_ENV: ${NODE_ENV:-development}
  JWT_SECRET: ${JWT_SECRET:-change-me}
  JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
  APP_VERIFY_URL: ${APP_VERIFY_URL:-http://localhost:4200/verify-email?token=}
  CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:4200}
  SMTP_HOST: ${SMTP_HOST:-}
  SMTP_PORT: ${SMTP_PORT:-587}
  SMTP_USER: ${SMTP_USER:-}
  SMTP_PASSWORD: ${SMTP_PASSWORD:-}
  APP_MAIL_FROM: ${APP_MAIL_FROM:-no-reply@company.local}

services:
  db:
    image: postgres:15
    container_name: aSync-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-aSyncFocus}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - async_pgdata:/var/lib/postgresql/data

  api:
    build: .
    container_name: async-api
    restart: unless-stopped
    environment:
      <<: *api-environment
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-aSyncFocus}?schema=public
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    depends_on:
      - db
    command: ["sh", "-c", "npx prisma migrate deploy && node dist/index.js"]

volumes:
  async_pgdata:
