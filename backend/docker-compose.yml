version: '3.9'

services:
  db:
    image: postgres:15
    container_name: aSync-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aSyncFocus
    ports:
      - "5432:5432"
    volumes:
      - async_pgdata:/var/lib/postgresql/data

  api:
    build: .
    container_name: async-api
    restart: unless-stopped
    environment:
      PORT: 8080
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@db:5432/aSyncFocus?schema=public
      JWT_SECRET: change-me
      JWT_EXPIRES_IN: 1d
      APP_VERIFY_URL: http://localhost:4200/verify-email?token=
      CORS_ORIGIN: http://localhost:4200
      SMTP_HOST: ""
      SMTP_PORT: 587
      SMTP_USER: ""
      SMTP_PASSWORD: ""
      APP_MAIL_FROM: "aSync <miqueiascompany@gmail.com>"
    ports:
      - "8080:8080"
    depends_on:
      - db
    command: ["sh", "-c", "npx prisma migrate deploy && node dist/index.js"]

volumes:
  async_pgdata:
